<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Eldermoor — Play (new engine)</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0c1014;
    -webkit-touch-callout:none;-webkit-user-select:none;user-select:none;}
  #c{display:block;width:100%;height:100%;touch-action:none;-webkit-touch-callout:none;}
  #hint{position:fixed;top:8px;left:50%;transform:translateX(-50%);z-index:2;
    font-family:system-ui,sans-serif;font-size:13px;color:#f3e9cf;
    background:rgba(12,16,22,.78);padding:6px 12px;border-radius:8px;border:1px solid #4a525e;}
  .ui{font-family:"Trebuchet MS",system-ui,sans-serif;color:#f6eed6;}
  #log{position:fixed;left:10px;bottom:10px;width:min(72%,380px);font-size:13.5px;line-height:1.5;
    background:rgba(12,16,22,.78);border:1px solid #4a525e;border-radius:9px;padding:8px 11px;
    z-index:2;max-height:32%;overflow:hidden;}
  #log:empty{display:none;} #log div{text-shadow:0 1px 2px #000;margin:1px 0;}
  #dlg{position:fixed;left:50%;bottom:80px;transform:translateX(-50%);width:min(92%,460px);display:none;
    background:rgba(18,22,28,.96);border:1px solid #c8a24a;border-radius:12px;padding:14px 16px;z-index:3;}
  #dlg .who{color:#e7c64f;font-weight:bold;margin-bottom:5px;font-size:13px;}
  #dlg .tx{font-size:14px;line-height:1.5;}
  #dlg .go{margin-top:10px;text-align:right;}
  #dlg button{background:#3a6f8c;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;}
  #ctx{position:fixed;display:none;z-index:5;min-width:150px;background:rgba(18,22,28,.97);
    border:1px solid #c8a24a;border-radius:8px;overflow:hidden;box-shadow:0 8px 28px rgba(0,0,0,.5);}
  #ctx .h{background:rgba(40,32,12,.9);color:#e7c64f;font-size:11px;letter-spacing:.1em;
    text-transform:uppercase;padding:6px 12px;}
  #ctx .i{padding:9px 12px;font-size:14px;cursor:pointer;border-top:1px solid #2a2f37;}
  #ctx .i:active,#ctx .i:hover{background:rgba(60,50,20,.85);}
</style>
</head>
<body>
  <div id="hint">Tap to walk · tap an NPC/object to interact · (long-press menu coming next)</div>
  <canvas id="c"></canvas>
  <div id="log" class="ui"></div>
  <div id="dlg" class="ui"><div class="who" id="dlgwho"></div><div class="tx" id="dlgtx"></div>
    <div class="go"><button id="dlgbtn">Continue</button></div></div>
  <div id="ctx" class="ui"></div>
  <script type="module" src="/src/render/client.ts"></script>
</body>
</html>
