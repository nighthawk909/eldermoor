name: ci

# Keep `main` always-playable: every push/PR must pass the smoke check
# (every src/ module parses + index.html wires src/main.js).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Smoke check
        run: node scripts/smoke-check.mjs
