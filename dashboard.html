<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Eldermoor — Fleet Progress</title>
<style>
  :root{
    --bg:#14110c; --panel:#221b12; --panel2:#2c2418; --ink:#efe7d4; --muted:#a99c80;
    --line:#3a2f1f; --gold:#d8b25a; --accent:#3f6f8c;
    --queued:#6b6150; --building:#d8b25a; --review:#3f8cc2; --requeue:#c98a2a;
    --done:#4f8a3c; --blocked:#9c3030; --failed:#b03030;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:var(--gold)}
  header{position:sticky;top:0;z-index:10;background:linear-gradient(180deg,#1c160e,#14110c);
    border-bottom:1px solid var(--line);padding:14px 16px 12px}
  .titlerow{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  h1{font-size:18px;margin:0;letter-spacing:.5px;color:var(--gold)}
  .ver{font-size:12px;color:var(--muted)}
  .conn{margin-left:auto;font-size:11px;padding:3px 8px;border-radius:999px;border:1px solid var(--line);
    background:var(--panel);color:var(--muted);white-space:nowrap}
  .conn.live{color:#bfe6a8;border-color:#3c5e2c}
  .conn.local{color:#cdbb88;border-color:#5a4a24}
  .conn.off{color:#e0a0a0;border-color:#5a2424}
  /* summary bar */
  .bar{display:flex;height:14px;border-radius:7px;overflow:hidden;margin:12px 0 8px;border:1px solid var(--line);background:#0e0b07}
  .bar span{display:block;height:100%}
  .legend{display:flex;flex-wrap:wrap;gap:6px 14px;font-size:11px;color:var(--muted)}
  .legend i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;vertical-align:middle}
  .pct{font-size:12px;color:var(--ink);margin-left:6px}
  .controls{display:flex;gap:8px;margin-top:10px;align-items:center;flex-wrap:wrap}
  button{background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:8px;
    padding:7px 12px;font-size:13px;cursor:pointer;min-height:38px}
  button:active{transform:translateY(1px)}
  .upd{font-size:11px;color:var(--muted);margin-left:auto}
  /* board */
  main{padding:14px 16px 40px;max-width:980px;margin:0 auto}
  .epic{margin:18px 0 8px;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);
    border-bottom:1px dashed var(--line);padding-bottom:5px}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
  .card{background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--queued);
    border-radius:10px;padding:11px 12px;position:relative}
  .card .id{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.5px}
  .card .t{font-size:14px;margin:3px 0 7px;line-height:1.3}
  .card .meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:11px;color:var(--muted)}
  .pill{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:3px 8px;
    border-radius:999px;color:#14110c}
  .agent{color:var(--ink);background:var(--panel2);border:1px solid var(--line);padding:2px 7px;border-radius:6px}
  .note{font-size:11px;color:var(--muted);margin-top:7px;font-style:italic}
  /* status colors */
  .s-queued{border-left-color:var(--queued)} .p-queued{background:var(--queued);color:#efe7d4}
  .s-building{border-left-color:var(--building)} .p-building{background:var(--building)}
  .s-review{border-left-color:var(--review)} .p-review{background:var(--review);color:#fff}
  .s-requeue{border-left-color:var(--requeue)} .p-requeue{background:var(--requeue)}
  .s-done{border-left-color:var(--done)} .p-done{background:var(--done);color:#fff}
  .s-blocked{border-left-color:var(--blocked)} .p-blocked{background:var(--blocked);color:#fff}
  .s-failed{border-left-color:var(--failed)} .p-failed{background:var(--failed);color:#fff}
  /* building pulse */
  .s-building{animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(216,178,90,0)}50%{box-shadow:0 0 0 3px rgba(216,178,90,.18)}}
  .empty{color:var(--muted);text-align:center;padding:40px 0;font-size:14px}
</style>
</head>
<body>
<header>
  <div class="titlerow">
    <h1>⚒ Eldermoor Fleet</h1>
    <span class="ver" id="ver">—</span>
    <span class="conn" id="conn">connecting…</span>
  </div>
  <div class="bar" id="bar"></div>
  <div class="legend" id="legend"></div>
  <div class="controls">
    <button id="toggle">⏸ Pause</button>
    <button id="refresh">↻ Refresh</button>
    <span class="pct" id="pct"></span>
    <span class="upd" id="upd"></span>
  </div>
</header>
<main>
  <div id="board"><div class="empty">Loading board…</div></div>
</main>
<script>
(function(){
  var ENDPOINT = '/api/progress';   // KV-backed (phone-visible) when connected
  var LOCAL = './progress.json';    // single-writer fallback (served locally)
  var POLL_MS = 2000;
  var STATUSES = ['building','review','requeue','queued','blocked','failed','done'];
  var LABELS = {queued:'Queued',building:'Building',review:'Review',requeue:'Requeue',done:'Done',blocked:'Blocked',failed:'Failed'};
  var running = true, timer = null;

  function fmtAgo(ts){
    if(!ts) return '';
    var s = Math.max(0, Math.floor((Date.now()-ts)/1000));
    if(s<60) return s+'s ago';
    var m=Math.floor(s/60); if(m<60) return m+'m ago';
    var h=Math.floor(m/60); if(h<24) return h+'h ago';
    return Math.floor(h/24)+'d ago';
  }
  function setConn(state, text){
    var el=document.getElementById('conn');
    el.className='conn '+state; el.textContent=text;
  }

  async function fetchBoard(){
    // try the KV endpoint first; fall back to the local file
    try{
      var r=await fetch(ENDPOINT+'?_='+Date.now(),{cache:'no-store'});
      if(r.ok){
        var j=await r.json();
        if(j && j.ok && j.data && Array.isArray(j.data.board)){ setConn('live','● live (synced)'); return j.data; }
        if(j && j.ok && j.empty){ /* KV up but empty -> use local */ }
      }
    }catch(_){}
    try{
      var r2=await fetch(LOCAL+'?_='+Date.now(),{cache:'no-store'});
      if(r2.ok){ var d=await r2.json(); setConn('local','● local file'); return d; }
    }catch(_){}
    setConn('off','● offline');
    return null;
  }

  function render(data){
    if(!data || !Array.isArray(data.board)){ return; }
    document.getElementById('ver').textContent=data.version||'';
    document.getElementById('upd').textContent=data.updated?('updated '+fmtAgo(data.updated)):'';

    var counts={}; STATUSES.forEach(function(s){counts[s]=0;});
    data.board.forEach(function(c){ if(counts[c.status]===undefined)counts[c.status]=0; counts[c.status]++; });
    var total=data.board.length||1;

    // summary bar (done -> building -> review/requeue -> queued -> blocked/failed)
    var order=['done','building','review','requeue','queued','blocked','failed'];
    var bar=document.getElementById('bar'); bar.innerHTML='';
    order.forEach(function(s){
      if(!counts[s]) return;
      var span=document.createElement('span');
      span.style.width=(counts[s]/total*100)+'%';
      span.style.background='var(--'+s+')';
      span.title=LABELS[s]+': '+counts[s];
      bar.appendChild(span);
    });
    document.getElementById('pct').textContent=Math.round((counts.done/total)*100)+'% done · '+total+' chunks';

    var legend=document.getElementById('legend'); legend.innerHTML='';
    order.forEach(function(s){
      if(counts[s]===undefined) return;
      var span=document.createElement('span');
      span.innerHTML='<i style="background:var(--'+s+')"></i>'+LABELS[s]+' '+(counts[s]||0);
      legend.appendChild(span);
    });

    // group by epic
    var groups={}; var gorder=[];
    data.board.forEach(function(c){
      var k=c.epic||'?'; if(!groups[k]){groups[k]=[];gorder.push(k);} groups[k].push(c);
    });
    var rank={building:0,review:1,requeue:2,queued:3,blocked:4,failed:5,done:6};
    var board=document.getElementById('board'); board.innerHTML='';
    if(!data.board.length){ board.innerHTML='<div class="empty">No chunks on the board yet.</div>'; return; }
    gorder.forEach(function(g){
      var h=document.createElement('div'); h.className='epic'; h.textContent=g; board.appendChild(h);
      var wrap=document.createElement('div'); wrap.className='cards';
      groups[g].sort(function(a,b){return (rank[a.status]||9)-(rank[b.status]||9);});
      groups[g].forEach(function(c){
        var card=document.createElement('div'); card.className='card s-'+c.status;
        var agent=c.agent?('<span class="agent">'+esc(c.agent)+'</span>'):'';
        var ago=c.ts?('<span>'+fmtAgo(c.ts)+'</span>'):'';
        card.innerHTML=
          '<div class="id">'+esc(c.id)+'</div>'+
          '<div class="t">'+esc(c.title||'')+'</div>'+
          '<div class="meta"><span class="pill p-'+c.status+'">'+(LABELS[c.status]||c.status)+'</span>'+agent+ago+'</div>'+
          (c.note?'<div class="note">'+esc(c.note)+'</div>':'');
        wrap.appendChild(card);
      });
      board.appendChild(wrap);
    });
  }
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]);});}

  async function tick(){ var d=await fetchBoard(); if(d) render(d); }
  function loop(){ if(timer) clearTimeout(timer); if(running){ tick().then(function(){ timer=setTimeout(loop,POLL_MS); }); } }

  document.getElementById('toggle').addEventListener('click',function(){
    running=!running; this.textContent=running?'⏸ Pause':'▶ Resume';
    if(running) loop(); else if(timer) clearTimeout(timer);
  });
  document.getElementById('refresh').addEventListener('click',tick);
  loop();
})();
</script>
</body>
</html>
