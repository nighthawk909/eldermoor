<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Eldermoor — Client</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;background:#0c1014;
    font-family:"Trebuchet MS","Segoe UI",system-ui,sans-serif;color:#f3e9cf;}
  #c{display:block;width:100%;height:100%;touch-action:none;
    user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;}
  .ui{position:fixed;pointer-events:none;}
  #hud{top:10px;left:50%;transform:translateX(-50%);text-align:center;max-width:92vw;
    background:rgba(20,24,30,.72);border:1px solid #c8a24a;border-radius:10px;
    padding:7px 16px;font-size:13px;text-shadow:0 1px 3px #000;}
  #hud b{color:#e7c64f;}
  #help{bottom:10px;left:10px;background:rgba(20,24,30,.7);border:1px solid #6b5a32;
    border-radius:8px;padding:6px 11px;font-size:12px;color:#cdbf98;text-shadow:0 1px 2px #000;line-height:1.5;}
  #help b{color:#e7c64f;}
  /* dialogue box (OSRS-style) */
  #dlg{position:fixed;z-index:15;left:50%;bottom:calc(80px + env(safe-area-inset-bottom));
    transform:translateX(-50%);width:min(92%,460px);
    background:rgba(18,22,28,.96);border:1px solid #c8a24a;border-radius:12px;padding:14px 16px;
    pointer-events:auto;display:none;box-shadow:0 10px 40px rgba(0,0,0,.5);}
  #dlg .who{color:#e7c64f;font-weight:bold;margin-bottom:5px;font-size:13px;}
  #dlg .tx{font-size:14px;line-height:1.5;}
  #dlg .go{margin-top:10px;text-align:right;}
  #dlg button{pointer-events:auto;background:#3a6f8c;color:#fff;border:none;border-radius:8px;
    padding:8px 16px;font-size:13px;cursor:pointer;}
  /* right-click / long-press context menu (OSRS-style options) */
  #menu{position:fixed;display:none;z-index:10;background:rgba(18,22,28,.98);border:1px solid #c8a24a;
    border-radius:8px;padding:4px;min-width:150px;box-shadow:0 8px 30px rgba(0,0,0,.6);pointer-events:auto;}
  #menu .hdr{padding:5px 12px 6px;font-size:11px;letter-spacing:.06em;color:#9fb0c0;
    border-bottom:1px solid #3a424c;margin-bottom:3px;}
  #menu .mi{padding:9px 12px;font-size:14px;color:#f3e9cf;border-radius:6px;cursor:pointer;white-space:nowrap;}
  #menu .mi:hover,#menu .mi:active{background:#3a6f8c;}
  #menu .mi .o{color:#e7c64f;}
  #load{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:15px;color:#cdbf98;background:#0c1014;transition:opacity .5s;z-index:5;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui" id="hud">Eldermoor — <b>Chapel Grounds</b> <span style="opacity:.6">v24</span> · <b>tap</b> to walk/talk · <b>long-press</b> for options · drag to look</div>
<div class="ui" id="help"><b>Controls</b><br>Tap — walk / talk to the monk<br>Long-press (or right-click) — Talk-to / Examine / Walk here<br>Drag — orbit · pinch / scroll — zoom</div>
<div id="dlg"><div class="who" id="dlgwho"></div><div class="tx" id="dlgtx"></div><div class="go"><button id="dlgbtn">Continue</button></div></div>
<div id="menu"></div>
<div id="load">Entering the Chapel…</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script type="module" src="src/main.js"></script>
</body>
</html>
