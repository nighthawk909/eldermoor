<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Eldermoor — Tutorial Island</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;background:#0c1014;
    font-family:"Trebuchet MS","Segoe UI",system-ui,sans-serif;color:#f3e9cf;}
  #c{display:block;width:100%;height:100%;touch-action:none;}
  .ui{position:fixed;pointer-events:none;}
  /* objective banner */
  #obj{top:10px;left:50%;transform:translateX(-50%);max-width:90%;text-align:center;
    background:rgba(20,24,30,.72);border:1px solid #c8a24a;border-radius:10px;
    padding:8px 16px;font-size:14px;backdrop-filter:blur(4px);text-shadow:0 1px 3px #000;}
  #obj .lab{color:#e7c64f;font-size:10px;letter-spacing:.25em;text-transform:uppercase;display:block;margin-bottom:2px;}
  /* chat log */
  #log{left:10px;bottom:10px;width:min(46%,330px);font-size:12.5px;line-height:1.5;
    text-shadow:0 1px 2px #000;}
  #log div{opacity:.95;}
  /* buttons */
  #btns{right:10px;bottom:10px;display:flex;gap:8px;pointer-events:auto;}
  .btn{width:54px;height:54px;border-radius:12px;background:rgba(24,28,34,.85);
    border:1px solid #5b6470;color:#f3e9cf;font-size:11px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:2px;cursor:pointer;backdrop-filter:blur(3px);}
  .btn .ic{font-size:20px;line-height:1;}
  .btn.active{border-color:#e7c64f;background:rgba(60,50,20,.85);}
  /* panels */
  .panel{position:fixed;right:10px;bottom:74px;width:min(86%,320px);max-height:62%;overflow:auto;
    background:rgba(18,22,28,.94);border:1px solid #5b6470;border-radius:12px;padding:12px;
    pointer-events:auto;display:none;box-shadow:0 10px 40px rgba(0,0,0,.5);}
  .panel.show{display:block;}
  .panel h3{margin:0 0 8px;font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:#e7c64f;}
  .skills{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .sk{display:flex;align-items:center;gap:7px;background:rgba(40,46,54,.6);border-radius:7px;padding:5px 8px;font-size:12px;}
  .sk .ic{font-size:15px;}
  .sk .lv{margin-left:auto;font-weight:bold;color:#fff;}
  .sk .lv small{color:#9fb0c0;font-weight:normal;}
  .total{margin-top:8px;text-align:center;font-size:12px;color:#cdbf98;}
  .inv{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
  .slot{aspect-ratio:1;background:rgba(40,46,54,.6);border:1px solid #3a424c;border-radius:8px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;position:relative;cursor:pointer;}
  .slot .ic{font-size:22px;}
  .slot .ct{position:absolute;top:2px;right:4px;color:#7fe07f;font-size:11px;font-weight:bold;}
  .slot .nm{font-size:9px;color:#bcc7d2;margin-top:1px;}
  .slot.empty{opacity:.35;cursor:default;}
  /* xp drops */
  #xpd{top:54px;left:50%;transform:translateX(-50%);width:0;}
  .xp{position:absolute;left:0;transform:translateX(-50%);white-space:nowrap;font-weight:bold;
    color:#7fe07f;text-shadow:0 1px 3px #000;font-size:14px;animation:rise 1.4s ease-out forwards;}
  @keyframes rise{from{opacity:0;transform:translate(-50%,10px);}15%{opacity:1;}to{opacity:0;transform:translate(-50%,-34px);}}
  /* action progress */
  #prog{left:50%;bottom:90px;transform:translateX(-50%);width:180px;height:12px;
    background:rgba(0,0,0,.55);border:1px solid #888;border-radius:7px;overflow:hidden;display:none;}
  #prog>div{height:100%;width:0;background:linear-gradient(90deg,#e7c64f,#7fe07f);}
  /* dialogue */
  #dlg{left:50%;bottom:80px;transform:translateX(-50%);width:min(92%,460px);
    background:rgba(18,22,28,.96);border:1px solid #c8a24a;border-radius:12px;padding:14px 16px;
    pointer-events:auto;display:none;}
  #dlg .who{color:#e7c64f;font-weight:bold;margin-bottom:5px;font-size:13px;}
  #dlg .tx{font-size:14px;line-height:1.5;}
  #dlg .go{margin-top:10px;text-align:right;}
  #dlg button{pointer-events:auto;background:#3a6f8c;color:#fff;border:none;border-radius:8px;
    padding:8px 16px;font-size:13px;cursor:pointer;}
  /* finish */
  #fin{inset:0;background:rgba(8,10,14,.85);display:none;align-items:center;justify-content:center;
    pointer-events:auto;z-index:20;text-align:center;}
  #fin .card{background:#171b22;border:1px solid #e7c64f;border-radius:16px;padding:28px 32px;max-width:90%;}
  #fin h2{color:#e7c64f;margin:0 0 8px;}
  #hint{top:50%;left:50%;transform:translate(-50%,-50%);color:#cdbf98;font-size:13px;text-align:center;
    background:rgba(20,24,30,.6);padding:8px 14px;border-radius:8px;transition:opacity .5s;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui" id="obj"><span class="lab">Objective</span><span id="objtx">Loading…</span></div>
<div class="ui" id="xpd"></div>
<div class="ui" id="log"></div>
<div class="ui" id="prog"><div></div></div>
<div id="hint" class="ui">Drag to look · pinch/scroll to zoom · tap ground to walk · tap things to use</div>
<div id="dlg"><div class="who" id="dlgwho"></div><div class="tx" id="dlgtx"></div><div class="go"><button id="dlgbtn">Continue</button></div></div>
<div id="btns">
  <div class="btn" id="bSkills"><span class="ic">📊</span>Skills</div>
  <div class="btn" id="bInv"><span class="ic">🎒</span>Items</div>
</div>
<div class="panel" id="pSkills"><h3>Skills</h3><div class="skills" id="skillGrid"></div><div class="total" id="totalLv"></div></div>
<div class="panel" id="pInv"><h3>Inventory</h3><div class="inv" id="invGrid"></div></div>
<div id="fin"><div class="card"><h2>Tutorial Complete!</h2><div id="fintx"></div><div class="go" style="margin-top:14px"><button onclick="location.reload()">Play again</button></div></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* =====================================================================
   ELDERMOOR — TUTORIAL ISLAND  (playable prototype)
   ===================================================================== */
const TAU=Math.PI*2;
const col=h=>new THREE.Color(h).convertSRGBToLinear();
const mat=(h,o={})=>new THREE.MeshStandardMaterial({color:col(h),flatShading:true,
  roughness:o.r??0.9,metalness:o.m??0,emissive:o.e?col(o.e):0x000000,emissiveIntensity:o.ei??1});

/* ---------- renderer / scene ---------- */
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputEncoding=THREE.sRGBEncoding;
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.05;
const scene=new THREE.Scene();
const SKY=col('#cfe6f2'); scene.fog=new THREE.Fog(SKY,38,90);
const camera=new THREE.PerspectiveCamera(52,innerWidth/innerHeight,0.1,300);

/* sky dome */
(function(){const g=new THREE.SphereGeometry(140,20,14),top=col('#5e93c9'),bot=col('#e7ddc4'),c=[];
 const v=new THREE.Vector3();const p=g.attributes.position;
 for(let i=0;i<p.count;i++){v.fromBufferAttribute(p,i).normalize();const t=Math.max(0,v.y);
   c.push(bot.r+(top.r-bot.r)*t,bot.g+(top.g-bot.g)*t,bot.b+(top.b-bot.b)*t);}
 g.setAttribute('color',new THREE.Float32BufferAttribute(c,3));
 scene.add(new THREE.Mesh(g,new THREE.MeshBasicMaterial({vertexColors:true,side:THREE.BackSide,fog:false})));})();

/* lights */
scene.add(new THREE.HemisphereLight(col('#bcd6ff'),col('#5a4a32'),0.85));
scene.add(new THREE.AmbientLight(0xffffff,0.18));
const sun=new THREE.DirectionalLight(col('#ffe7bd'),2.1);
sun.position.set(24,34,16); sun.castShadow=true; sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near=1;sun.shadow.camera.far=120;
sun.shadow.camera.left=-44;sun.shadow.camera.right=44;sun.shadow.camera.top=44;sun.shadow.camera.bottom=-44;
sun.shadow.bias=-0.0004; scene.add(sun);

/* ---------- island terrain ---------- */
const ISLE=24;
function gh(x,z){ // ground height
  const r=Math.hypot(x,z);
  if(r>ISLE+3) return -2.2;
  let beach=0; if(r>ISLE-3) beach=-(r-(ISLE-3))*0.45;
  let h=Math.sin(x*0.12)*0.5+Math.cos(z*0.11)*0.45+Math.sin((x+z)*0.07)*0.3;
  h=Math.max(0,h)*Math.max(0,1-r/(ISLE+2));
  return h+beach;
}
function terrainCol(x,z,y){
  const r=Math.hypot(x,z);
  if(r>ISLE-2.4||y<0.02) return Math.random()<.5?col('#d9c79a'):col('#cdb98a'); // sand
  const k=Math.random(); const hi=Math.min(1,Math.max(0,y/1.0));
  let b=k<.33?col('#4f8a3c'):k<.66?col('#578f3f'):col('#477d34');
  return b.clone().lerp(col('#86b85e'),hi*0.4);
}
let groundMesh;
(function(){
  const S=64;let g=new THREE.PlaneGeometry(72,72,S,S);g.rotateX(-Math.PI/2);
  const p=g.attributes.position;
  for(let i=0;i<p.count;i++)p.setY(i,gh(p.getX(i),p.getZ(i)));
  g=g.toNonIndexed();const pp=g.attributes.position,n=pp.count,ca=new Float32Array(n*3);
  for(let i=0;i<n;i+=3){let cx=0,cz=0,cy=0;for(let k=0;k<3;k++){cx+=pp.getX(i+k);cz+=pp.getZ(i+k);cy+=pp.getY(i+k);}
    cx/=3;cz/=3;cy/=3;const c=terrainCol(cx,cz,cy);for(let k=0;k<3;k++){ca[(i+k)*3]=c.r;ca[(i+k)*3+1]=c.g;ca[(i+k)*3+2]=c.b;}}
  g.setAttribute('color',new THREE.BufferAttribute(ca,3));g.computeVertexNormals();
  groundMesh=new THREE.Mesh(g,new THREE.MeshStandardMaterial({vertexColors:true,flatShading:true,roughness:1}));
  groundMesh.receiveShadow=true;scene.add(groundMesh);
})();
/* sea */
(function(){const g=new THREE.PlaneGeometry(300,300).rotateX(-Math.PI/2);
  const m=mat('#2f7fa0',{r:0.2,m:0.1});m.transparent=true;m.opacity=0.88;
  const sea=new THREE.Mesh(g,m);sea.position.y=-0.35;scene.add(sea);window.__sea=sea;})();

/* ---------- character / npc factory (crisp blockout style) ---------- */
function P(geo,m,x,y,z){const me=new THREE.Mesh(geo,m);me.position.set(x,y,z);me.castShadow=true;me.receiveShadow=true;return me;}
function makeChar(o={}){
  const tunic=o.tunic||'#3f6f8c',leg=o.leg||'#2f3742',skin=o.skin||'#e8b98e',hair=o.hair||'#3a2a1c';
  const g=new THREE.Group();g.userData={};
  const legL=new THREE.Group(),legR=new THREE.Group();
  [[legL,1],[legR,-1]].forEach(([G,s])=>{G.position.set(0.16*s,0.78,0);
    G.add(P(new THREE.BoxGeometry(0.24,0.6,0.26),mat(leg),0,-0.3,0));
    G.add(P(new THREE.BoxGeometry(0.27,0.16,0.36),mat('#5a3f28'),0,-0.6,0.05));g.add(G);});
  g.add(P(new THREE.BoxGeometry(0.56,0.66,0.34),mat(tunic),0,1.12,0)); // torso
  if(o.tabard)g.add(P(new THREE.BoxGeometry(0.26,0.5,0.04),mat(o.tabard),0,1.12,0.19));
  const armL=new THREE.Group(),armR=new THREE.Group();
  [[armL,1],[armR,-1]].forEach(([G,s])=>{G.position.set(0.36*s,1.42,0);
    G.add(P(new THREE.BoxGeometry(0.17,0.56,0.2),mat(o.sleeve||tunic),0,-0.26,0));
    G.add(P(new THREE.BoxGeometry(0.15,0.16,0.16),mat(skin),0,-0.52,0));g.add(G);});
  g.add(P(new THREE.CylinderGeometry(0.09,0.1,0.12,6),mat(skin),0,1.5,0)); // neck
  const head=P(new THREE.BoxGeometry(0.4,0.4,0.38),mat(skin),0,1.78,0);g.add(head);
  if(o.hat){g.add(P(new THREE.ConeGeometry(0.32,0.5,8),mat(o.hat),0,2.2,0));}
  else{g.add(P(new THREE.BoxGeometry(0.44,0.18,0.42),mat(hair),0,2.0,-0.01));
       g.add(P(new THREE.BoxGeometry(0.12,0.2,0.06),mat(hair),0,1.86,-0.18));}
  g.add(P(new THREE.BoxGeometry(0.05,0.06,0.02),mat('#20140c'),0.09,1.8,0.19));
  g.add(P(new THREE.BoxGeometry(0.05,0.06,0.02),mat('#20140c'),-0.09,1.8,0.19));
  if(o.beard)g.add(P(new THREE.BoxGeometry(0.34,0.18,0.1),mat(o.beard),0,1.64,0.16));
  g.userData={legL,legR,armL,armR};
  return g;
}
function makeRat(){
  const g=new THREE.Group();g.add(P(new THREE.BoxGeometry(0.5,0.3,0.8),mat('#6b6258'),0,0.2,0));
  g.add(P(new THREE.BoxGeometry(0.3,0.26,0.3),mat('#6b6258'),0,0.26,0.45));
  const tail=P(new THREE.ConeGeometry(0.05,0.5,4),mat('#caa'),0,0.2,-0.6);tail.rotation.x=-1.3;g.add(tail);
  g.add(P(new THREE.BoxGeometry(0.04,0.05,0.02),mat('#200'),0.08,0.3,0.6));
  g.add(P(new THREE.BoxGeometry(0.04,0.05,0.02),mat('#200'),-0.08,0.3,0.6));
  return g;
}

/* nameplate */
function plate(text,hex,y){
  const cv=document.createElement('canvas');cv.width=256;cv.height=64;const x=cv.getContext('2d');
  x.font='bold 30px Trebuchet MS';x.textAlign='center';x.textBaseline='middle';
  x.lineWidth=6;x.strokeStyle='rgba(0,0,0,.9)';x.strokeText(text,128,32);x.fillStyle=hex;x.fillText(text,128,32);
  const t=new THREE.CanvasTexture(cv);t.minFilter=THREE.LinearFilter;
  const s=new THREE.Sprite(new THREE.SpriteMaterial({map:t,transparent:true,depthTest:false}));
  s.scale.set(2.2,0.55,1);s.position.y=y;s.renderOrder=999;return s;
}

/* ---------- props ---------- */
function makeTree(){const g=new THREE.Group();
  g.add(P(new THREE.CylinderGeometry(0.16,0.26,1.5,6),mat('#6b4a2c'),0,0.75,0));
  const c=new THREE.Group();c.position.y=1.6;[['#3f7a32',0.8,0],['#4f8a3c',0.62,0.45],['#356b2a',0.5,0.85]]
    .forEach(([h,r,yy])=>c.add(P(new THREE.IcosahedronGeometry(r,0),mat(h),0,yy,0)));
  g.add(c);g.userData.canopy=c;return g;}
function makeRock(){const g=new THREE.Group();const r=P(new THREE.IcosahedronGeometry(0.6,0),mat('#7d8089',{r:1}),0,0.35,0);
  r.scale.y=0.8;g.add(r);for(let i=0;i<4;i++){const a=i/4*TAU;g.add(P(new THREE.IcosahedronGeometry(0.1,0),mat('#caa24a',{m:0.3,r:0.5}),Math.cos(a)*0.4,0.5,Math.sin(a)*0.4));}return g;}
function makeFire(lit){const g=new THREE.Group();
  for(let i=0;i<5;i++){const a=i/5*TAU;const lg=P(new THREE.CylinderGeometry(0.05,0.05,0.6,5),mat('#5a3f28'),Math.cos(a)*0.2,0.1,Math.sin(a)*0.2);lg.rotation.z=1;g.add(lg);}
  if(lit){const fl=P(new THREE.ConeGeometry(0.25,0.7,6),mat('#ff8a2c',{e:'#ff7a1c',ei:1.6}),0,0.45,0);g.add(fl);g.userData.flame=fl;
    const L=new THREE.PointLight(col('#ff9a3c'),2.2,8,2);L.position.y=0.7;g.add(L);g.userData.light=L;}
  return g;}
function makeFishSpot(){const g=new THREE.Group();
  const ring=new THREE.Mesh(new THREE.RingGeometry(0.4,0.6,16).rotateX(-Math.PI/2),new THREE.MeshBasicMaterial({color:col('#bfe9ff'),transparent:true,opacity:0.7}));
  g.add(ring);g.userData.ring=ring;return g;}
function makeFurnace(){const g=new THREE.Group();g.add(P(new THREE.BoxGeometry(1.2,1.3,1.2),mat('#7d7066',{r:1}),0,0.65,0));
  g.add(P(new THREE.BoxGeometry(0.5,0.5,0.3),mat('#ff8a2c',{e:'#ff6a1c',ei:1.4}),0,0.5,0.6));return g;}
function makeAnvil(){const g=new THREE.Group();g.add(P(new THREE.BoxGeometry(0.5,0.3,0.9),mat('#3a3f46',{m:0.4,r:0.5}),0,0.7,0));
  g.add(P(new THREE.BoxGeometry(0.3,0.5,0.3),mat('#3a3f46',{m:0.4,r:0.5}),0,0.35,0));return g;}
function makeDummy(){const g=new THREE.Group();g.add(P(new THREE.CylinderGeometry(0.06,0.06,1.4,6),mat('#6b4a2c'),0,0.7,0));
  g.add(P(new THREE.BoxGeometry(0.5,0.6,0.4),mat('#cdb38b',{r:1}),0,1.2,0));g.add(P(new THREE.SphereGeometry(0.2,6,5),mat('#cdb38b',{r:1}),0,1.65,0));return g;}
function makeTarget(){const g=new THREE.Group();g.add(P(new THREE.CylinderGeometry(0.05,0.05,1.2,6),mat('#6b4a2c'),0,0.6,0));
  [['#fff',0.45],['#cf4a3a',0.32],['#fff',0.2],['#cf4a3a',0.09]].forEach(([h,r])=>{const d=P(new THREE.CylinderGeometry(r,r,0.06,16),mat(h),0,1.3,0);d.rotation.x=Math.PI/2;g.add(d);});return g;}
function makeAltar(){const g=new THREE.Group();g.add(P(new THREE.BoxGeometry(1.4,0.8,0.7),mat('#cdc6b6',{r:1}),0,0.4,0));
  g.add(P(new THREE.BoxGeometry(1.5,0.15,0.8),mat('#b7ad96',{r:1}),0,0.85,0));
  g.add(P(new THREE.IcosahedronGeometry(0.16,0),mat('#9be0ff',{e:'#7fd0ff',ei:1.6}),0,1.1,0));return g;}
function makeTable(){const g=new THREE.Group();g.add(P(new THREE.BoxGeometry(1.2,0.1,0.8),mat('#6b4a2c'),0,0.8,0));
  [[0.5,0.3],[-0.5,0.3],[0.5,-0.3],[-0.5,-0.3]].forEach(([x,z])=>g.add(P(new THREE.BoxGeometry(0.1,0.8,0.1),mat('#5a3f28'),x,0.4,z)));
  g.add(P(new THREE.BoxGeometry(0.3,0.12,0.2),mat('#9c6b3a'),0,0.9,0));return g;}
function makeBoat(){const g=new THREE.Group();g.add(P(new THREE.BoxGeometry(1.4,0.5,3),mat('#6b4a2c'),0,0.25,0));
  g.add(P(new THREE.CylinderGeometry(0.06,0.06,2.2,6),mat('#5a3f28'),0,1.3,0));
  g.add(P(new THREE.BoxGeometry(0.04,1.2,1.0),mat('#e8e0d0'),0,1.4,0));return g;}
function makeTrees(n){for(let i=0;i<n;i++){const a=Math.random()*TAU,r=4+Math.random()*(ISLE-6);
  const x=Math.cos(a)*r,z=Math.sin(a)*r;if(stationsNear(x,z))continue;const t=makeTree();
  t.position.set(x,gh(x,z),z);t.scale.setScalar(0.8+Math.random()*0.5);scene.add(t);}}
function stationsNear(x,z){return STN.some(s=>Math.hypot(s.pos.x-x,s.pos.z-z)<4);}

/* ===================================================================== STATE */
const SKILLS=[
 ['Attack','⚔️'],['Strength','💪'],['Defence','🛡️'],['Hitpoints','❤️'],['Ranged','🏹'],
 ['Magic','✨'],['Prayer','🙏'],['Woodcutting','🪓'],['Firemaking','🔥'],['Fishing','🎣'],
 ['Cooking','🍳'],['Mining','⛏️'],['Smithing','🔨'],['Crafting','🧵']];
const ICON=Object.fromEntries(SKILLS);
const xpTable=(()=>{let a=[0],p=0;for(let l=1;l<99;l++){p+=Math.floor(l+300*Math.pow(2,l/7));a.push(Math.floor(p/4));}return a;})();
function levelFromXp(xp){let l=1;for(let i=1;i<99;i++){if(xp>=xpTable[i])l=i+1;else break;}return Math.min(l,99);}
const skill={}; SKILLS.forEach(([s])=>skill[s]={xp:0});
skill.Hitpoints.xp=xpTable[9]; // start HP 10 like OSRS
const inv={}; // name -> {ct, ic}
const ITEM={Logs:'🪵',Shrimp:'🦐','Raw shrimp':'🦐',Ore:'🪨','Bronze dagger':'🗡️',Bones:'🦴',Tinderbox:'🔥',Coins:'🪙','Leather pouch':'👝'};
function addItem(n,c=1){if(!inv[n])inv[n]={ct:0,ic:ITEM[n]||'❓'};inv[n].ct+=c;if(inv[n].ct<=0)delete inv[n];renderInv();}
function hasItem(n){return inv[n]&&inv[n].ct>0;}
addItem('Tinderbox',1);

/* ---------- HUD ---------- */
const logEl=document.getElementById('log');
function msg(t){const d=document.createElement('div');d.textContent=t;logEl.appendChild(d);
  while(logEl.children.length>5)logEl.removeChild(logEl.firstChild);}
function xpDrop(s,amt){const e=document.createElement('div');e.className='xp';e.textContent=`+${amt} ${s}`;
  document.getElementById('xpd').appendChild(e);setTimeout(()=>e.remove(),1400);}
function addXp(s,amt){const before=levelFromXp(skill[s].xp);skill[s].xp+=amt;const after=levelFromXp(skill[s].xp);
  xpDrop(s,amt);renderSkills();if(after>before)msg(`⭐ ${s} level ${after}!`);}
function renderSkills(){const g=document.getElementById('skillGrid');g.innerHTML='';let tot=0;
  SKILLS.forEach(([s,ic])=>{const lv=levelFromXp(skill[s].xp);tot+=lv;
    g.insertAdjacentHTML('beforeend',`<div class="sk"><span class="ic">${ic}</span>${s.slice(0,4)}<span class="lv">${lv}</span></div>`);});
  document.getElementById('totalLv').textContent=`Total level: ${tot}`;}
function renderInv(){const g=document.getElementById('invGrid');g.innerHTML='';const names=Object.keys(inv);
  for(let i=0;i<16;i++){const n=names[i];
    if(n)g.insertAdjacentHTML('beforeend',`<div class="slot" data-n="${n}"><span class="ct">${inv[n].ct}</span><span class="ic">${inv[n].ic}</span><span class="nm">${n}</span></div>`);
    else g.insertAdjacentHTML('beforeend',`<div class="slot empty"></div>`);}
  g.querySelectorAll('.slot[data-n]').forEach(el=>el.onclick=()=>useItem(el.dataset.n));}
function useItem(n){if(n==='Bones'){addItem('Bones',-1);addXp('Prayer',12);msg('You bury the bones.');checkStep('Prayer');}}
renderSkills();renderInv();
function togglePanel(p,b){const el=document.getElementById(p);el.classList.toggle('show');
  document.getElementById(b).classList.toggle('active',el.classList.contains('show'));}
document.getElementById('bSkills').onclick=()=>{togglePanel('pSkills','bSkills');document.getElementById('pInv').classList.remove('show');document.getElementById('bInv').classList.remove('active');};
document.getElementById('bInv').onclick=()=>{togglePanel('pInv','bInv');document.getElementById('pSkills').classList.remove('show');document.getElementById('bSkills').classList.remove('active');};

/* ===================================================================== WORLD / STATIONS */
const STN=[]; // {id,pos,obj,kind,...}
function addStation(s){const y=gh(s.pos.x,s.pos.z);s.obj.position.set(s.pos.x,y,s.pos.z);
  if(s.rot)s.obj.rotation.y=s.rot;scene.add(s.obj);
  if(s.label)s.obj.add(plate(s.label,s.color||'#e7c64f',s.labelY||2.4));
  s.pos.y=y;STN.push(s);return s;}

/* ===================================================================== TUTORIAL */
const STEPS=[
 {t:"Talk to the Guide.",tg:'guide'},
 {t:"Chop the Tree (Woodcutting).",tg:'tree'},
 {t:"Light a fire with your logs (Firemaking).",tg:'fire'},
 {t:"Catch a shrimp at the Fishing spot.",tg:'fish'},
 {t:"Cook your shrimp on the fire (Cooking).",tg:'cook'},
 {t:"Mine the Copper rock (Mining).",tg:'rock'},
 {t:"Smith a dagger at the Anvil (Smithing).",tg:'smith'},
 {t:"Attack the Combat dummy (Melee).",tg:'melee'},
 {t:"Kill the Giant rat for bones.",tg:'rat'},
 {t:"Open your Items and bury the Bones (Prayer).",tg:null},
 {t:"Shoot the Archery target (Ranged).",tg:'archery'},
 {t:"Talk to the Wizard, then cast on the dummy (Magic).",tg:'magic'},
 {t:"Craft at the Crafting table.",tg:'craft'},
 {t:"Board the Boat to finish the tutorial!",tg:'boat'}];
let step=0;
const objtx=document.getElementById('objtx');
function showStep(){objtx.textContent=STEPS[step]?STEPS[step].t:'Done!';placeBeacon();}
function checkStep(key){ // key = skill name OR station id
  const s=STEPS[step];if(!s)return;
  const map={guide:'guide',tree:'Woodcutting',fire:'Firemaking',fish:'Fishing',cook:'Cooking',
    rock:'Mining',smith:'Smithing',melee:'melee',rat:'rat',archery:'Ranged',magic:'Magic',craft:'Crafting',boat:'boat'};
  const want = s.tg?map[s.tg]:'Prayer';
  if(key===want||key===s.tg){step++;showStep();if(step>=STEPS.length)finish();}
}
/* beacon */
const beacon=new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.5,8,12,1,true),
  new THREE.MeshBasicMaterial({color:col('#ffe08a'),transparent:true,opacity:0.28,side:THREE.DoubleSide}));
beacon.visible=false;scene.add(beacon);
function placeBeacon(){const s=STEPS[step];if(s&&s.tg){const st=STN.find(x=>x.id===s.tg);
  if(st){beacon.position.set(st.pos.x,st.pos.y+4,st.pos.z);beacon.visible=true;return;}}beacon.visible=false;}

/* ===================================================================== CAMERA */
const sph={r:13,th:0.7,phi:0.95};const camT=new THREE.Vector3();
function clampR(){sph.r=Math.max(6,Math.min(28,sph.r));}
function updCam(){const t=player.position;camT.lerp(new THREE.Vector3(t.x,t.y+1.0,t.z),0.12);
  camera.position.set(camT.x+sph.r*Math.sin(sph.phi)*Math.sin(sph.th),camT.y+sph.r*Math.cos(sph.phi),camT.z+sph.r*Math.sin(sph.phi)*Math.cos(sph.th));
  camera.lookAt(camT);}
const ptr=new Map();let down=null,dragged=false,pinch=null;
canvas.addEventListener('pointerdown',e=>{canvas.setPointerCapture(e.pointerId);ptr.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(ptr.size===1){down={x:e.clientX,y:e.clientY};dragged=false;}if(ptr.size===2)pinch=pd();});
canvas.addEventListener('pointermove',e=>{if(!ptr.has(e.pointerId))return;const pv=ptr.get(e.pointerId);
  const dx=e.clientX-pv.x,dy=e.clientY-pv.y;ptr.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(ptr.size===2){const d=pd();if(pinch)sph.r*=pinch/d;clampR();pinch=d;return;}
  if(down&&Math.hypot(e.clientX-down.x,e.clientY-down.y)>7)dragged=true;
  sph.th-=dx*0.005;sph.phi=Math.max(0.4,Math.min(1.35,sph.phi-dy*0.005));});
canvas.addEventListener('pointerup',e=>{const two=ptr.size===2;ptr.delete(e.pointerId);if(ptr.size<2)pinch=null;
  if(!two&&!dragged&&down)click(down.x,down.y);if(ptr.size===0)down=null;});
canvas.addEventListener('wheel',e=>{sph.r*=1+e.deltaY*0.0012;clampR();e.preventDefault();},{passive:false});
function pd(){const v=[...ptr.values()];return Math.hypot(v[0].x-v[1].x,v[0].y-v[1].y);}

/* ===================================================================== CLICK / ACTIONS */
const ray=new THREE.Raycaster();
function click(px,py){
  const ndc=new THREE.Vector2(px/innerWidth*2-1,-(py/innerHeight*2)+1);ray.setFromCamera(ndc,camera);
  // stations first
  const objs=STN.filter(s=>s.kind!=='deco'&&s.alive!==false).map(s=>s.obj);
  const hit=ray.intersectObjects(objs,true);
  if(hit.length){let o=hit[0].object;while(o.parent&&!STN.find(s=>s.obj===o))o=o.parent;
    const st=STN.find(s=>s.obj===o);if(st){player.target=new THREE.Vector2(st.pos.x,st.pos.z);player.pending=st;hideDlg();return;}}
  const g=ray.intersectObject(groundMesh);if(g.length){player.target=new THREE.Vector2(g[0].point.x,g[0].point.z);player.pending=null;}
}
let action=null; // {st,t,dur}
const progEl=document.getElementById('prog');
function startAction(st){
  if(st.kind==='npc'){dialog(st);return;}
  if(st.kind==='finish'){finish();return;}
  if(st.kind==='combat'){engage(st);return;}
  // prereq checks
  if(st.need&&!hasItem(st.need)){msg(`You need ${st.need} first.`);return;}
  action={st,t:0,dur:st.dur||1500};progEl.style.display='block';
  msg(`You ${st.verb} the ${st.label}…`);
}
function finishAction(st){
  if(st.need)addItem(st.need,-1);
  if(st.give)addItem(st.give,1);
  if(st.skill)addXp(st.skill,st.xp);
  if(st.give)msg(`You get: ${st.give}.`);
  // ranged/magic/melee small projectile feedback handled in engage/cast
  checkStep(st.skill||st.id);checkStep(st.id);
}
/* combat (rat) */
function engage(st){player.combat=st;}
function makeHit(pos,dmg){const cv=document.createElement('canvas');cv.width=64;cv.height=64;const x=cv.getContext('2d');
  x.fillStyle=dmg>0?'#c81e1e':'#3a6f8c';x.beginPath();x.arc(32,32,26,0,TAU);x.fill();
  x.fillStyle='#fff';x.font='bold 30px sans-serif';x.textAlign='center';x.textBaseline='middle';x.fillText(dmg,32,34);
  const s=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv),transparent:true,depthTest:false}));
  s.scale.set(0.7,0.7,1);s.position.copy(pos);s.position.y+=1.3;s.renderOrder=998;scene.add(s);
  s.userData.t=0;hits.push(s);}
const hits=[];
/* dialogue */
const dlgEl=document.getElementById('dlg');let dlgQ=[],dlgSt=null;
function dialog(st){dlgQ=st.dlg.slice();dlgSt=st;nextDlg();}
function nextDlg(){if(!dlgQ.length){hideDlg();if(dlgSt&&dlgSt.id==='guide')checkStep('guide');dlgSt=null;return;}
  document.getElementById('dlgwho').textContent=dlgSt.label;document.getElementById('dlgtx').textContent=dlgQ.shift();dlgEl.style.display='block';}
function hideDlg(){dlgEl.style.display='none';}
document.getElementById('dlgbtn').onclick=nextDlg;
function finish(){document.getElementById('fintx').innerHTML=
  `You trained every skill. Total level <b>${SKILLS.reduce((a,[s])=>a+levelFromXp(skill[s].xp),0)}</b>.<br>The boat sails for the mainland…`;
  document.getElementById('fin').style.display='flex';}

/* ===================================================================== LOOP */
const clock=new THREE.Clock();let walkP=0;
function animate(){requestAnimationFrame(animate);const dt=Math.min(clock.getDelta(),0.05),t=clock.elapsedTime;
  // movement
  let moving=false;
  if(player.target){const dx=player.target.x-player.position.x,dz=player.target.y-player.position.z,d=Math.hypot(dx,dz);
    const stopDist=player.pending?1.6:0.15;
    if(d>stopDist){moving=true;const sp=Math.min(3.6*dt/d,1);player.position.x+=dx*sp;player.position.z+=dz*sp;
      player.position.y=gh(player.position.x,player.position.z);player.rotation.y=Math.atan2(dx,dz);}
    else{player.target=null;if(player.pending){const st=player.pending;player.pending=null;
      player.rotation.y=Math.atan2(st.pos.x-player.position.x,st.pos.z-player.position.z);startAction(st);}}}
  // walk anim
  const u=player.userData;
  if(moving){walkP+=dt*9;const s=Math.sin(walkP)*0.6;u.legL.rotation.x=s;u.legR.rotation.x=-s;u.armL.rotation.x=-s*0.6;u.armR.rotation.x=s*0.6;}
  else{u.legL.rotation.x*=0.8;u.legR.rotation.x*=0.8;u.armL.rotation.x*=0.8;u.armR.rotation.x*=0.8;}
  // action progress
  if(action){action.t+=dt;progEl.firstElementChild.style.width=Math.min(100,action.t/action.dur*100)+'%';
    u.armR.rotation.x=Math.sin(t*16)*0.7; // working motion
    if(action.t>=action.dur){const st=action.st;action=null;progEl.style.display='none';progEl.firstElementChild.style.width=0;
      finishAction(st);}}
  // combat
  if(player.combat){const st=player.combat;if(st.alive===false){player.combat=null;}
    else{const d=Math.hypot(st.pos.x-player.position.x,st.pos.z-player.position.z);
      if(d<2.0){player.rotation.y=Math.atan2(st.pos.x-player.position.x,st.pos.z-player.position.z);
        st.atk=(st.atk||0)+dt;if(st.atk>0.8){st.atk=0;const dmg=1+Math.floor(Math.random()*3);st.hp-=dmg;
          makeHit(st.obj.position,dmg);u.armR.rotation.x=-1.2;
          ['Attack','Strength','Defence'].forEach(s=>addXp(s,4));addXp('Hitpoints',2);
          if(st.hp<=0){st.alive=false;st.obj.visible=false;msg(`You defeat the ${st.label}.`);
            addItem(st.drop,1);msg(`Drop: ${st.drop}.`);checkStep('rat');player.combat=null;
            setTimeout(()=>{st.hp=st.maxhp;st.alive=true;st.obj.visible=true;},6000);}}}
      else{player.target=new THREE.Vector2(st.pos.x,st.pos.z);player.combat=st;}}}
  // ambient anim
  STN.forEach(s=>{if(s.obj.userData.flame){const f=0.85+Math.sin(t*18)*0.12;s.obj.userData.flame.scale.set(f,1+Math.sin(t*22)*0.2,f);}
    if(s.obj.userData.ring)s.obj.userData.ring.scale.setScalar(1+Math.sin(t*3)*0.15);});
  if(window.__sea)window.__sea.material.opacity=0.85+Math.sin(t*1.5)*0.05;
  beacon.rotation.y=t*1.2;beacon.material.opacity=0.2+Math.sin(t*3)*0.08;
  for(let i=hits.length-1;i>=0;i--){const h=hits[i];h.userData.t+=dt;h.position.y+=dt*0.6;
    if(h.userData.t>0.9){scene.remove(h);hits.splice(i,1);}}
  updCam();renderer.render(scene,camera);
}
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
showStep();updCam();animate();
setTimeout(()=>{const h=document.getElementById('hint');h.style.opacity=0;setTimeout(()=>h.remove(),600);},4200);
</script>
