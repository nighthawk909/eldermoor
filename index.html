<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Eldermoor — Tutorial Island</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;background:#0c1014;
    font-family:"Trebuchet MS","Segoe UI",system-ui,sans-serif;color:#f3e9cf;}
  #c{display:block;width:100%;height:100%;touch-action:none;}
  .ui{position:fixed;pointer-events:none;}
  /* objective banner */
  #obj{top:10px;left:50%;transform:translateX(-50%);max-width:90%;text-align:center;
    background:rgba(20,24,30,.72);border:1px solid #c8a24a;border-radius:10px;
    padding:8px 16px;font-size:14px;backdrop-filter:blur(4px);text-shadow:0 1px 3px #000;}
  #obj .lab{color:#e7c64f;font-size:10px;letter-spacing:.25em;text-transform:uppercase;display:block;margin-bottom:2px;}
  /* chat log */
  #log{left:10px;bottom:78px;width:min(72%,380px);font-size:13.5px;line-height:1.5;
    background:rgba(12,16,22,.78);border:1px solid #4a525e;border-radius:9px;
    padding:8px 11px;backdrop-filter:blur(4px);box-shadow:0 6px 22px rgba(0,0,0,.45);
    max-height:34%;overflow:hidden;}
  #log:empty{display:none;}
  #log div{opacity:1;color:#f6eed6;text-shadow:0 1px 2px #000;margin:1px 0;}
  /* buttons */
  #btns{position:fixed;right:10px;bottom:10px;display:flex;gap:10px;pointer-events:auto;z-index:30;}
  .btn{width:60px;height:60px;border-radius:14px;background:rgba(24,28,34,.9);
    border:1px solid #6b7480;color:#f3e9cf;font-size:11px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:2px;cursor:pointer;backdrop-filter:blur(3px);
    box-shadow:0 4px 16px rgba(0,0,0,.45);user-select:none;}
  .btn:active{transform:scale(.94);}
  .btn .ic{font-size:20px;line-height:1;}
  .btn.active{border-color:#e7c64f;background:rgba(60,50,20,.85);}
  /* panels */
  .panel{position:fixed;right:10px;bottom:84px;width:min(92%,360px);max-height:62%;overflow:auto;
    background:rgba(18,22,28,.94);border:1px solid #5b6470;border-radius:12px;padding:12px;
    pointer-events:auto;display:none;box-shadow:0 10px 40px rgba(0,0,0,.5);}
  .panel.show{display:block;}
  .panel h3{margin:0 0 8px;font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:#e7c64f;}
  .skills{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .sk{display:flex;align-items:center;gap:6px;background:rgba(40,46,54,.6);border-radius:7px;padding:5px 8px;font-size:12px;}
  .sk .ic{font-size:15px;flex:none;}
  .sk .nm{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sk .lv{flex:none;margin-left:4px;font-weight:bold;color:#fff;}
  .sk .lv small{color:#9fb0c0;font-weight:normal;}
  .total{margin-top:8px;text-align:center;font-size:12px;color:#cdbf98;}
  .inv{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
  .slot{aspect-ratio:1;background:rgba(40,46,54,.6);border:1px solid #3a424c;border-radius:8px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;position:relative;cursor:pointer;}
  .slot .ic{font-size:22px;}
  .slot .ct{position:absolute;top:2px;right:4px;color:#7fe07f;font-size:11px;font-weight:bold;}
  .slot .nm{font-size:9px;color:#bcc7d2;margin-top:1px;}
  .slot.empty{opacity:.35;cursor:default;}
  /* xp drops */
  #xpd{top:54px;left:50%;transform:translateX(-50%);width:0;}
  .xp{position:absolute;left:0;transform:translateX(-50%);white-space:nowrap;font-weight:bold;
    color:#7fe07f;text-shadow:0 1px 3px #000;font-size:14px;animation:rise 1.4s ease-out forwards;}
  @keyframes rise{from{opacity:0;transform:translate(-50%,10px);}15%{opacity:1;}to{opacity:0;transform:translate(-50%,-34px);}}
  /* action progress */
  #prog{left:50%;bottom:90px;transform:translateX(-50%);width:180px;height:12px;
    background:rgba(0,0,0,.55);border:1px solid #888;border-radius:7px;overflow:hidden;display:none;}
  #prog>div{height:100%;width:0;background:linear-gradient(90deg,#e7c64f,#7fe07f);}
  /* dialogue */
  #dlg{left:50%;bottom:80px;transform:translateX(-50%);width:min(92%,460px);
    background:rgba(18,22,28,.96);border:1px solid #c8a24a;border-radius:12px;padding:14px 16px;
    pointer-events:auto;display:none;}
  #dlg .who{color:#e7c64f;font-weight:bold;margin-bottom:5px;font-size:13px;}
  #dlg .tx{font-size:14px;line-height:1.5;}
  #dlg .go{margin-top:10px;text-align:right;}
  #dlg button{pointer-events:auto;background:#3a6f8c;color:#fff;border:none;border-radius:8px;
    padding:8px 16px;font-size:13px;cursor:pointer;}
  /* finish */
  #fin{inset:0;background:rgba(8,10,14,.85);display:none;align-items:center;justify-content:center;
    pointer-events:auto;z-index:20;text-align:center;}
  #fin .card{background:#171b22;border:1px solid #e7c64f;border-radius:16px;padding:28px 32px;max-width:90%;}
  #fin h2{color:#e7c64f;margin:0 0 8px;}
  #hint{top:50%;left:50%;transform:translate(-50%,-50%);color:#cdbf98;font-size:13px;text-align:center;
    background:rgba(20,24,30,.6);padding:8px 14px;border-radius:8px;transition:opacity .5s;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui" id="obj"><span class="lab">Objective</span><span id="objtx">Loading…</span></div>
<div class="ui" id="xpd"></div>
<div class="ui" id="log"></div>
<div class="ui" id="prog"><div></div></div>
<div id="hint" class="ui">Drag to look · pinch/scroll to zoom · tap ground to walk · tap things to use</div>
<div id="dlg"><div class="who" id="dlgwho"></div><div class="tx" id="dlgtx"></div><div class="go"><button id="dlgbtn">Continue</button></div></div>
<div id="btns">
  <div class="btn" id="bSkills"><span class="ic">📊</span>Skills</div>
  <div class="btn" id="bInv"><span class="ic">🎒</span>Items</div>
</div>
<div class="panel" id="pSkills"><h3>Skills</h3><div class="skills" id="skillGrid"></div><div class="total" id="totalLv"></div></div>
<div class="panel" id="pInv"><h3>Inventory</h3><div class="inv" id="invGrid"></div></div>
<div id="fin"><div class="card"><h2>Tutorial Complete!</h2><div id="fintx"></div><div class="go" style="margin-top:14px"><button onclick="location.reload()">Play again</button></div></div></div>

<!-- THREE r128 (UMD global), then the ES-module entry point -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script type="module" src="src/main.js"></script>
</body>
</html>
