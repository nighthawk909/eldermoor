<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ELDERMOOR — Art Direction Render</title>
<style>
  :root{
    --ink:#f3e9cf; --ink-dim:#c9bd9c; --frame:#2a2117; --gold:#d8b25a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;overflow:hidden;background:#0c1014;
    font-family:"Iowan Old Style","Palatino Linotype",Georgia,serif;}
  #c{display:block;width:100%;height:100%;touch-action:none;}
  /* vignette to seat the scene */
  #vig{position:fixed;inset:0;pointer-events:none;
    box-shadow:inset 0 0 220px 40px rgba(8,10,14,0.55);
    background:radial-gradient(120% 90% at 50% 18%, transparent 55%, rgba(8,10,14,0.35) 100%);}
  .panel{position:fixed;pointer-events:none;color:var(--ink);
    text-shadow:0 2px 6px rgba(0,0,0,0.8);}
  #brand{left:18px;top:14px;}
  #brand .eyebrow{font-size:11px;letter-spacing:.34em;color:var(--gold);
    text-transform:uppercase;font-family:ui-monospace,monospace;}
  #brand .title{font-size:30px;letter-spacing:.06em;line-height:1;margin-top:4px;font-weight:600;}
  #brand .sub{font-size:12px;color:var(--ink-dim);margin-top:5px;font-style:italic;}
  #hint{left:50%;bottom:16px;transform:translateX(-50%);text-align:center;
    font-size:12.5px;color:var(--ink-dim);letter-spacing:.02em;
    background:rgba(14,16,20,0.42);border:1px solid rgba(216,178,90,0.22);
    border-radius:999px;padding:7px 16px;pointer-events:none;backdrop-filter:blur(3px);}
  #hint b{color:var(--ink);font-weight:600;}
  #loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    color:var(--gold);letter-spacing:.3em;font-size:13px;font-family:ui-monospace,monospace;
    background:#0c1014;transition:opacity .6s ease;z-index:5;}
  .legend{right:16px;top:16px;text-align:right;font-size:12px;color:var(--ink-dim);line-height:1.7;}
  .legend .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-left:7px;vertical-align:middle;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="vig"></div>
<div id="loading">SUMMONING ELDERMOOR…</div>
<div class="panel" id="brand">
  <div class="eyebrow">Art Direction Render</div>
  <div class="title">ELDERMOOR</div>
  <div class="sub">working look — original assets, RuneScape-era register</div>
</div>
<div class="panel legend">
  Adventurer<span class="dot" style="background:#7fd0ff"></span><br>
  Townsfolk<span class="dot" style="background:#e7c94f"></span><br>
  Hostile<span class="dot" style="background:#e0584c"></span>
</div>
<div class="panel" id="hint"><b>Drag</b> to orbit · <b>Scroll / pinch</b> to zoom · <b>Click ground</b> to walk</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* =====================================================================
   ELDERMOOR — art-direction render
   A crafted stylized world built to lock the visual target before Unity.
   Visual language: faceted (flat-shaded) geometry, warm late-afternoon
   key light, long soft shadows, harmonized storybook palette, ACES grade.
   ===================================================================== */

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;

const scene = new THREE.Scene();
const HORIZON = new THREE.Color('#cfe0d8').convertSRGBToLinear();
scene.fog = new THREE.Fog(HORIZON, 34, 78);

const camera = new THREE.PerspectiveCamera(52, innerWidth/innerHeight, 0.1, 220);

/* ---- color helper: author in sRGB, store linear (accurate under ACES) ---- */
function col(hex){ return new THREE.Color(hex).convertSRGBToLinear(); }
function mat(hex, o){ o=o||{}; return new THREE.MeshStandardMaterial({
  color: col(hex), flatShading:true,
  roughness: o.rough!==undefined?o.rough:0.9,
  metalness: o.metal!==undefined?o.metal:0.0,
  emissive: o.emis?col(o.emis):0x000000,
  emissiveIntensity: o.emisI!==undefined?o.emisI:1,
  transparent: !!o.transparent, opacity: o.opacity!==undefined?o.opacity:1,
}); }

/* ============================ LIGHTING ============================== */
const hemi = new THREE.HemisphereLight(col('#bcd6ff'), col('#5a4a32'), 0.85);
scene.add(hemi);
const amb = new THREE.AmbientLight(0xffffff, 0.18); scene.add(amb);
const sun = new THREE.DirectionalLight(col('#ffe7bd'), 2.15);
sun.position.set(20, 26, 12);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1; sun.shadow.camera.far = 90;
sun.shadow.camera.left=-34; sun.shadow.camera.right=34;
sun.shadow.camera.top=34; sun.shadow.camera.bottom=-34;
sun.shadow.bias = -0.0004; sun.shadow.normalBias = 0.03;
scene.add(sun);

/* ============================ SKYDOME ============================== */
(function sky(){
  const g = new THREE.SphereGeometry(110, 24, 16);
  const top = col('#5e93c9'), bot = col('#e7ddc4');
  const pos = g.attributes.position, cols=[];
  const v = new THREE.Vector3();
  for(let i=0;i<pos.count;i++){
    v.fromBufferAttribute(pos,i).normalize();
    const t = Math.max(0, v.y);
    cols.push(bot.r+(top.r-bot.r)*t, bot.g+(top.g-bot.g)*t, bot.b+(top.b-bot.b)*t);
  }
  g.setAttribute('color', new THREE.Float32BufferAttribute(cols,3));
  scene.add(new THREE.Mesh(g, new THREE.MeshBasicMaterial({vertexColors:true, side:THREE.BackSide, fog:false})));
})();

/* ============================ TERRAIN ============================== */
const WORLD=46, SEG=58;
const pond={x:-10, z:10, r:6.0}, WATER_Y=-0.25;
function hash2(x,z){ const n=Math.sin(x*127.1+z*311.7)*43758.5453; return n-Math.floor(n); }
function inPond(x,z){ return Math.hypot(x-pond.x,z-pond.z)<pond.r; }
function pathDist(x,z){ const cx=Math.sin(z*0.11)*3.2; return Math.abs(x-cx); }
function groundKind(x,z){ if(inPond(x,z))return 'water'; if(pathDist(x,z)<1.8)return 'path'; return 'grass'; }
function groundHeight(x,z){
  if(inPond(x,z)){ const d=Math.hypot(x-pond.x,z-pond.z)/pond.r; return WATER_Y-1.0*(1-d); }
  let h = Math.sin(x*0.27)*0.5 + Math.cos(z*0.23)*0.42 + Math.sin((x+z)*0.15)*0.28;
  h += (hash2(Math.floor(x),Math.floor(z))-0.5)*0.18;
  h = Math.max(h, -0.05);
  const pd = pathDist(x,z);
  if(pd<1.8){ const t=pd/1.8; h = h*(t*t)*0.35 + 0.02; }
  return h;
}
function groundColor(x,z,y){
  const k=groundKind(x,z), r=hash2(Math.round(x*1.7),Math.round(z*1.7));
  if(k==='water') return col('#2c6a82');
  if(k==='path')  return r<0.5?col('#8c6b40'):col('#7d5e35');
  const hi = Math.min(1, Math.max(0, y/1.0));
  let base = r<0.33?col('#4f8a3c') : r<0.66?col('#578f3f') : col('#477d34');
  return base.clone().lerp(col('#86b85e'), hi*0.45);
}
(function terrain(){
  let g = new THREE.PlaneGeometry(WORLD, WORLD, SEG, SEG); g.rotateX(-Math.PI/2);
  const p=g.attributes.position;
  for(let i=0;i<p.count;i++){ p.setY(i, groundHeight(p.getX(i), p.getZ(i))); }
  g = g.toNonIndexed();
  const pp=g.attributes.position, n=pp.count, cArr=new Float32Array(n*3), c=new THREE.Vector3();
  for(let i=0;i<n;i+=3){
    let cx=0,cz=0,cy=0;
    for(let k=0;k<3;k++){ cx+=pp.getX(i+k); cz+=pp.getZ(i+k); cy+=pp.getY(i+k); }
    cx/=3; cz/=3; cy/=3;
    const color=groundColor(cx,cz,cy);
    for(let k=0;k<3;k++){ cArr[(i+k)*3]=color.r; cArr[(i+k)*3+1]=color.g; cArr[(i+k)*3+2]=color.b; }
  }
  g.setAttribute('color', new THREE.BufferAttribute(cArr,3));
  g.computeVertexNormals();
  const m=new THREE.MeshStandardMaterial({vertexColors:true, flatShading:true, roughness:0.97, metalness:0});
  const mesh=new THREE.Mesh(g,m); mesh.receiveShadow=true; mesh.name='ground';
  scene.add(mesh); window.__ground=mesh;
})();

/* ---- water surface ---- */
const water=(function(){
  const g=new THREE.CircleGeometry(pond.r+0.4, 28); g.rotateX(-Math.PI/2);
  const m=mat('#3f8fb0',{rough:0.25,metal:0.1,transparent:true,opacity:0.82});
  const mesh=new THREE.Mesh(g,m); mesh.position.set(pond.x, WATER_Y, pond.z);
  mesh.receiveShadow=true; scene.add(mesh);
  // base position cache for wobble
  mesh.userData.base=g.attributes.position.array.slice(0);
  return mesh;
})();

/* ============================ NAMEPLATE ============================ */
function nameplate(text, hex, opts){
  opts=opts||{};
  const hasHP = opts.hp!==undefined;
  const cv=document.createElement('canvas'); cv.width=320; cv.height=hasHP?120:80;
  const x=cv.width/2, ctx=cv.getContext('2d');
  ctx.font='600 38px Georgia'; ctx.textAlign='center'; ctx.textBaseline='middle';
  const ty=hasHP?34:42;
  ctx.lineWidth=7; ctx.strokeStyle='rgba(0,0,0,0.92)'; ctx.strokeText(text,x,ty);
  ctx.fillStyle=hex; ctx.fillText(text,x,ty);
  if(hasHP){
    const bw=210,bh=15,bx=x-bw/2,by=74;
    ctx.fillStyle='rgba(0,0,0,0.9)'; ctx.fillRect(bx-3,by-3,bw+6,bh+6);
    ctx.fillStyle='#5a1414'; ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle='#3fb24a'; ctx.fillRect(bx,by,bw*Math.max(0,Math.min(1,opts.hp)),bh);
  }
  const tex=new THREE.CanvasTexture(cv); tex.minFilter=THREE.LinearFilter; tex.anisotropy=4;
  const spr=new THREE.Sprite(new THREE.SpriteMaterial({map:tex, transparent:true, depthTest:false, depthWrite:false}));
  spr.scale.set(2.6, 2.6*cv.height/320, 1); spr.renderOrder=999;
  return spr;
}

/* ============================ ASSET FACTORY ======================== */
const SKIN=['#e8b98e','#caa074','#a87a52','#8a5f3c'];
function part(geo, material, x,y,z){ const m=new THREE.Mesh(geo,material); m.position.set(x,y,z); m.castShadow=true; m.receiveShadow=true; return m; }
function limb(){ const g=new THREE.Group(); return g; }

/* --- ADVENTURER (hero): crafted humanoid w/ tunic, cape, sword, shield --- */
/* sculpted low-poly head: tapered skull, nose, brow, angular eyes, styled hair, beard.
   Reusable across all humanoids — this is the silhouette that reads as "RuneScape". */
function makeHead(skinHex, hairHex, opts){
  opts=opts||{};
  const H=new THREE.Group();
  const skinM=mat(skinHex), hairM=mat(hairHex,{rough:0.95});
  // --- tapered skull: pinch toward chin, flatten back, push face forward ---
  const sg=new THREE.IcosahedronGeometry(0.2,1), p=sg.attributes.position;
  for(let i=0;i<p.count;i++){
    let x=p.getX(i), y=p.getY(i), z=p.getZ(i);
    if(y<0){ const f=Math.max(0.5, 1+y*1.15); x*=f; z*=f; }   // jaw -> chin
    z *= (z<0?0.9:1.05);                                       // flat back / fuller face
    p.setXYZ(i,x,y,z);
  }
  sg.computeVertexNormals();
  const skull=new THREE.Mesh(sg,skinM); skull.castShadow=true; skull.scale.set(1.0,1.18,1.0); H.add(skull);
  // brow ridge (heavy, overhangs the eyes)
  const brow=part(new THREE.BoxGeometry(0.27,0.05,0.08), skinM, 0,0.055,0.16); brow.rotation.x=0.28; H.add(brow);
  // nose: 3-sided wedge pointing forward/down
  const nose=part(new THREE.ConeGeometry(0.062,0.18,3), skinM, 0,-0.01,0.17); nose.rotation.x=Math.PI/2+0.32; nose.scale.set(0.8,1,1); H.add(nose);
  // angular eyes set under the brow
  const eyeM=mat('#241812');
  const eL=part(new THREE.BoxGeometry(0.085,0.04,0.03), eyeM, 0.085,0.005,0.165); eL.rotation.z=-0.22; H.add(eL);
  const eR=part(new THREE.BoxGeometry(0.085,0.04,0.03), eyeM,-0.085,0.005,0.165); eR.rotation.z=0.22; H.add(eR);
  // hair: top mass + forward fringe + sideburns + back — chunky faceted chunks
  const top=part(new THREE.IcosahedronGeometry(0.205,1), hairM, 0,0.075,-0.02); top.scale.set(1.07,0.72,1.09); H.add(top);
  const fringe=part(new THREE.BoxGeometry(0.3,0.09,0.13), hairM, 0,0.145,0.12); fringe.rotation.x=0.5; H.add(fringe);
  H.add(part(new THREE.BoxGeometry(0.07,0.22,0.17), hairM, 0.185,0.0,-0.02));   // sideburn L
  H.add(part(new THREE.BoxGeometry(0.07,0.22,0.17), hairM,-0.185,0.0,-0.02));   // sideburn R
  H.add(part(new THREE.BoxGeometry(0.27,0.2,0.1), hairM, 0,0.02,-0.16));        // back
  // short beard framing the jaw
  if(opts.beard!==false){
    const bM=mat(opts.beardColor||hairHex,{rough:1});
    H.add(part(new THREE.BoxGeometry(0.2,0.1,0.09), bM, 0,-0.16,0.11));         // chin
    H.add(part(new THREE.BoxGeometry(0.08,0.15,0.09), bM, 0.135,-0.07,0.09));   // jaw L
    H.add(part(new THREE.BoxGeometry(0.08,0.15,0.09), bM,-0.135,-0.07,0.09));   // jaw R
  }
  return H;
}

function makeAdventurer(o){
  o=o||{};
  const tunic=o.tunic||'#3f6f8c', trim=o.trim||'#d8b25a', cape=o.cape||'#9c3030';
  const trouser='#2f3742', leather='#5a3f28', steel='#c2cad4', skin=o.skin||SKIN[0], hair=o.hair||'#3a2a1c';
  const root=new THREE.Group(); root.userData={legL:null,legR:null,armL:null,armR:null,torso:null,cape:null,kind:'hero'};

  // shaped boot: ankle + forward foot + raised toe + sole (reads as a boot, not a cube)
  function boot(){
    const b=new THREE.Group();
    b.add(part(new THREE.BoxGeometry(0.19,0.16,0.2),  mat(leather,{rough:0.8}), 0,0.0,-0.02));   // ankle
    b.add(part(new THREE.BoxGeometry(0.2,0.12,0.3),   mat(leather,{rough:0.8}), 0,-0.06,0.12));  // foot
    b.add(part(new THREE.BoxGeometry(0.18,0.07,0.12), mat(leather,{rough:0.8}), 0,-0.03,0.28));  // toe (raised)
    b.add(part(new THREE.BoxGeometry(0.22,0.04,0.44), mat('#3a2a1c',{rough:0.9}), 0,-0.115,0.1)); // sole
    return b;
  }
  // legs (hip-pivoted), tapered + longer
  function leg(side){
    const g=limb(); g.position.set(0.15*side, 0.84, 0);
    g.add(part(new THREE.CylinderGeometry(0.1,0.12,0.62,6), mat(trouser), 0,-0.33,0));
    const bt=boot(); bt.position.set(0,-0.68,0); g.add(bt);
    return g;
  }
  const legL=leg(1), legR=leg(-1); root.add(legL,legR);

  // pelvis + belt (narrower)
  root.add(part(new THREE.BoxGeometry(0.42,0.18,0.28), mat(leather,{rough:0.7}), 0,0.88,0));
  root.add(part(new THREE.BoxGeometry(0.11,0.09,0.05), mat(trim,{metal:0.6,rough:0.4}), 0,0.88,0.155)); // buckle

  // torso (tapered) + sloped shoulder yoke (loses the boxy look)
  const torso=new THREE.Group(); torso.position.set(0,1.0,0);
  torso.add(part(new THREE.CylinderGeometry(0.2,0.27,0.64,8), mat(tunic), 0,0.32,0));
  torso.add(part(new THREE.CylinderGeometry(0.18,0.3,0.16,8), mat(tunic), 0,0.6,0));          // sloped shoulders
  torso.add(part(new THREE.BoxGeometry(0.22,0.46,0.04), mat(trim,{rough:0.6}), 0,0.34,0.245)); // tabard stripe
  root.add(torso);

  // arms (shoulder-pivoted), tapered sleeves + faceted hands
  function arm(side){
    const g=limb(); g.position.set(0.3*side, 1.56, 0);
    g.add(part(new THREE.CylinderGeometry(0.085,0.1,0.5,6), mat(tunic), 0,-0.25,0));
    const hand=part(new THREE.IcosahedronGeometry(0.085,0), mat(skin), 0,-0.53,0); hand.scale.set(1,0.9,1.1); g.add(hand);
    return g;
  }
  const armL=arm(1), armR=arm(-1); root.add(armL,armR);

  // neck + sculpted head
  root.add(part(new THREE.CylinderGeometry(0.07,0.085,0.12,6), mat(skin), 0,1.66,0));
  const head=makeHead(skin, hair, {beard:true}); head.position.set(0,1.86,0); root.add(head);

  // SWORD in right hand
  const sword=new THREE.Group();
  sword.add(part(new THREE.BoxGeometry(0.055,0.82,0.015), mat(steel,{metal:0.7,rough:0.28}),0,0.45,0));
  sword.add(part(new THREE.BoxGeometry(0.2,0.05,0.05), mat(trim,{metal:0.6,rough:0.4}),0,0.04,0));
  sword.add(part(new THREE.CylinderGeometry(0.028,0.028,0.15,6), mat(leather),0,-0.05,0));
  sword.add(part(new THREE.IcosahedronGeometry(0.04,0), mat(trim,{metal:0.6,rough:0.4}),0,-0.14,0));
  armR.add(sword); sword.position.set(0,-0.55,0.05); sword.rotation.set(-0.35,0,0.15);

  // SHIELD on left forearm
  const shield=new THREE.Group();
  shield.add(part(new THREE.CylinderGeometry(0.28,0.28,0.07,8), mat('#5a3f28',{rough:0.7}),0,0,0));
  shield.add(part(new THREE.CylinderGeometry(0.3,0.3,0.03,8), mat(steel,{metal:0.6,rough:0.4}),0,0.02,0));
  shield.add(part(new THREE.IcosahedronGeometry(0.065,0), mat(trim,{metal:0.7,rough:0.3}),0,0.06,0));
  shield.rotation.x=Math.PI/2; armL.add(shield); shield.position.set(0,-0.53,0.13);

  // CAPE
  const capeGeo=new THREE.PlaneGeometry(0.46,0.95,1,3);
  const capeMesh=new THREE.Mesh(capeGeo, mat(cape,{rough:0.85})); capeMesh.material.side=THREE.DoubleSide;
  capeMesh.castShadow=true; const capeG=new THREE.Group(); capeG.position.set(0,1.52,-0.18);
  capeMesh.position.set(0,-0.46,0); capeG.add(capeMesh); root.add(capeG);

  root.userData.legL=legL; root.userData.legR=legR; root.userData.armL=armL;
  root.userData.armR=armR; root.userData.torso=torso; root.userData.cape=capeG;
  root.add(nameplateAt(root, 'Adventurer', '#7fd0ff', 2.2));
  return root;
}

/* --- MERCHANT (townsfolk): robed, distinct silhouette --- */
function makeMerchant(){
  const root=new THREE.Group(); root.userData={kind:'idle', armL:null, armR:null};
  const robe='#9a7d34', robeDk='#7c6328', skin=SKIN[1];
  root.add(part(new THREE.CylinderGeometry(0.2,0.48,1.35,8), mat(robe), 0,0.68,0));      // robe body
  root.add(part(new THREE.CylinderGeometry(0.22,0.24,0.18,8), mat(robeDk), 0,1.36,0));   // collar
  root.add(part(new THREE.CylinderGeometry(0.09,0.1,0.1,6), mat(skin), 0,1.48,0));       // neck
  const head=part(new THREE.IcosahedronGeometry(0.2,1), mat(skin), 0,1.64,0); head.scale.set(1,1.1,1); root.add(head);
  const mhair=part(new THREE.IcosahedronGeometry(0.215,1), mat('#dfe3e8'), 0,1.69,-0.02); mhair.scale.set(1.03,0.55,1.05); root.add(mhair); // grey hair
  root.add(part(new THREE.ConeGeometry(0.26,0.22,8), mat(robeDk), 0,1.86,0));            // cap
  root.add(part(new THREE.BoxGeometry(0.04,0.05,0.02), mat('#20140c'), 0.07,1.64,0.18));
  root.add(part(new THREE.BoxGeometry(0.04,0.05,0.02), mat('#20140c'),-0.07,1.64,0.18));
  // arms
  function arm(side){ const g=limb(); g.position.set(0.26*side,1.28,0);
    g.add(part(new THREE.CylinderGeometry(0.08,0.1,0.5,6), mat(robe),0,-0.25,0));
    g.add(part(new THREE.BoxGeometry(0.13,0.13,0.13), mat(skin),0,-0.5,0)); return g; }
  const armL=arm(1), armR=arm(-1); root.add(armL,armR);
  // ledger in hand
  armR.add(part(new THREE.BoxGeometry(0.22,0.28,0.05), mat('#6b4a2a',{rough:0.8}),0,-0.5,0.06));
  root.userData.armL=armL; root.userData.armR=armR;
  // satchel
  root.add(part(new THREE.BoxGeometry(0.26,0.22,0.12), mat('#5a3f28',{rough:0.8}), 0.34,0.8,0.05));
  root.add(nameplateAt(root,'Merchant','#e7c94f',2.0));
  return root;
}

/* --- FOREST BRUTE (hostile): original hunched brute --- */
function makeBrute(){
  const root=new THREE.Group(); root.userData={kind:'idle', armL:null, armR:null, scaleBob:true};
  const hide='#5f7a45', hideDk='#4a6135', cloth='#6b4a2a', tusk='#e8e0c8', steel='#9aa1ac';
  // legs
  function leg(side){ const g=limb(); g.position.set(0.26*side,0.78,0);
    g.add(part(new THREE.CylinderGeometry(0.2,0.18,0.62,6), mat(hide),0,-0.3,0));
    g.add(part(new THREE.BoxGeometry(0.34,0.18,0.46), mat(hideDk),0,-0.6,0.06)); return g; }
  root.add(leg(1),leg(-1));
  root.add(part(new THREE.BoxGeometry(0.7,0.34,0.42), mat(cloth,{rough:0.85}),0,0.66,0)); // loincloth
  // hunched torso (leans forward)
  const torso=new THREE.Group(); torso.position.set(0,0.95,0); torso.rotation.x=0.32;
  torso.add(part(new THREE.CylinderGeometry(0.45,0.5,0.8,8), mat(hide),0,0.3,0));
  const hump=part(new THREE.SphereGeometry(0.55,8,6), mat(hide),0,0.45,-0.15); hump.scale.set(1,0.8,1); torso.add(hump); // broad back hump
  root.add(torso);
  // sunken head between shoulders
  const head=part(new THREE.IcosahedronGeometry(0.34,1), mat(hideDk),0,0.55,0.2); head.scale.set(1.1,0.95,1.05); torso.add(head);
  // eyes (glowing)
  const eMat=mat('#e0584c',{emis:'#ff5a3c',emisI:1.4});
  const eL=part(new THREE.IcosahedronGeometry(0.05,0), eMat, 0.12,0.05,0.30); head.add(eL);
  const eR=part(new THREE.IcosahedronGeometry(0.05,0), eMat,-0.12,0.05,0.30); head.add(eR);
  // tusks
  const tkL=part(new THREE.ConeGeometry(0.05,0.18,5), mat(tusk), 0.11,-0.16,0.26); tkL.rotation.x=Math.PI; head.add(tkL);
  const tkR=part(new THREE.ConeGeometry(0.05,0.18,5), mat(tusk),-0.11,-0.16,0.26); tkR.rotation.x=Math.PI; head.add(tkR);
  // long arms with clawed hands
  function arm(side){ const g=limb(); g.position.set(0.5*side,1.32,0);
    g.add(part(new THREE.CylinderGeometry(0.16,0.14,0.9,6), mat(hide),0,-0.45,0));
    const fist=part(new THREE.IcosahedronGeometry(0.2,0), mat(hideDk),0,-0.9,0); g.add(fist);
    for(let i=0;i<3;i++){ g.add(part(new THREE.ConeGeometry(0.04,0.16,4), mat(tusk), -0.1+i*0.1,-1.05,0.08)); }
    return g; }
  const armL=arm(1), armR=arm(-1); root.add(armL,armR); armL.rotation.x=0.4; armR.rotation.x=0.4;
  // crude club in right hand
  const club=new THREE.Group(); club.position.set(0,-0.9,0); club.rotation.z=0.3;
  club.add(part(new THREE.CylinderGeometry(0.06,0.09,0.9,6), mat('#5a3f28'),0,0.3,0));
  club.add(part(new THREE.IcosahedronGeometry(0.22,0), mat('#4a3320'),0,0.78,0));
  armR.add(club);
  root.userData.armL=armL; root.userData.armR=armR;
  root.add(nameplateAt(root,'Forest Brute  Lv-12','#e0584c',2.3,{hp:0.72}));
  return root;
}

/* --- CHICKEN (ambient life) --- */
function makeChicken(){
  const root=new THREE.Group(); root.userData={kind:'wander', home:null};
  const body=part(new THREE.IcosahedronGeometry(0.18,1), mat('#f2ede2'),0,0.28,0); body.scale.set(1.2,1,1.4); root.add(body);
  root.add(part(new THREE.IcosahedronGeometry(0.1,1), mat('#f7f3ea'),0,0.42,0.16));
  const beak=part(new THREE.ConeGeometry(0.04,0.1,4), mat('#e89b2c'),0,0.42,0.27); beak.rotation.x=Math.PI/2; root.add(beak);
  root.add(part(new THREE.BoxGeometry(0.06,0.06,0.02), mat('#cf4a3a'),0,0.5,0.13));   // comb
  const tail=part(new THREE.ConeGeometry(0.12,0.2,4), mat('#e7e0d2'),0,0.3,-0.18); tail.rotation.x=-0.7; root.add(tail); // tail
  root.add(part(new THREE.CylinderGeometry(0.012,0.012,0.14,4), mat('#e89b2c'),0.06,0.1,0));
  root.add(part(new THREE.CylinderGeometry(0.012,0.012,0.14,4), mat('#e89b2c'),-0.06,0.1,0));
  root.add(nameplateAt(root,'Chicken','#e7c94f',0.78));
  return root;
}

/* helper: nameplate parented + raised */
function nameplateAt(root, text, hex, y, opts){ const s=nameplate(text,hex,opts); s.position.set(0,y,0); return s; }

/* --- TREE --- */
function makeTree(seed){
  const g=new THREE.Group(); const s=0.85+hash2(seed,1)*0.5;
  g.add(part(new THREE.CylinderGeometry(0.16*s,0.26*s,1.5*s,6), mat('#6b4a2c'),0,0.75*s,0));
  const canopy=new THREE.Group(); canopy.position.set(0,1.5*s,0);
  const greens=['#3f7a32','#4f8a3c','#356b2a'];
  for(let i=0;i<3;i++){
    const r=(0.78-i*0.16)*s;
    const m=part(new THREE.IcosahedronGeometry(r,0), mat(greens[i%3]), (hash2(seed,i)-0.5)*0.3, i*0.5*s+0.2, (hash2(i,seed)-0.5)*0.3);
    canopy.add(m);
  }
  g.add(canopy); g.userData.canopy=canopy; g.userData.sway=hash2(seed,7)*6.28;
  return g;
}

/* --- ROCK --- */
function makeRock(seed){
  const r=0.3+hash2(seed,3)*0.45;
  const m=part(new THREE.IcosahedronGeometry(r,0), mat('#7d8089',{rough:1}),0,r*0.4,0);
  m.rotation.set(hash2(seed,1)*6,hash2(seed,2)*6,hash2(seed,4)*6); m.scale.y=0.7+hash2(seed,5)*0.4;
  return m;
}

/* --- COTTAGE --- */
function makeHouse(){
  const g=new THREE.Group();
  g.add(part(new THREE.BoxGeometry(3.4,2.3,3.0), mat('#d9c9a6',{rough:0.95}),0,1.15,0)); // plaster
  // timber frame
  const beam=mat('#5a3f28',{rough:0.85});
  [[-1.7,0],[1.7,0]].forEach(p=>g.add(part(new THREE.BoxGeometry(0.14,2.3,0.14),beam,p[0],1.15,1.52)));
  g.add(part(new THREE.BoxGeometry(3.4,0.16,0.14),beam,0,2.25,1.52));
  g.add(part(new THREE.BoxGeometry(3.4,0.16,0.14),beam,0,1.15,1.52));
  // roof (4-sided pyramid)
  const roof=part(new THREE.ConeGeometry(2.85,1.7,4), mat('#7a3b2c',{rough:0.95}),0,3.15,0); roof.rotation.y=Math.PI/4; g.add(roof);
  // door + windows (warm lit)
  g.add(part(new THREE.BoxGeometry(0.7,1.3,0.1), mat('#4a3320'),0,0.65,1.53));
  const win=mat('#ffd98a',{emis:'#ffcf6e',emisI:0.9,rough:0.5});
  g.add(part(new THREE.BoxGeometry(0.55,0.55,0.08), win,-1.05,1.5,1.53));
  g.add(part(new THREE.BoxGeometry(0.55,0.55,0.08), win, 1.05,1.5,1.53));
  // chimney
  g.add(part(new THREE.BoxGeometry(0.4,1.0,0.4), mat('#8a8079',{rough:1}),1.0,3.4,-0.6));
  // hanging sign
  g.add(part(new THREE.BoxGeometry(0.1,0.7,0.1), beam, 1.95,1.6,1.4));
  g.add(part(new THREE.BoxGeometry(0.7,0.4,0.05), mat('#6b4a2a'),2.1,1.95,1.4));
  return g;
}

/* --- CAMPFIRE (animated) --- */
function makeCampfire(){
  const g=new THREE.Group();
  for(let i=0;i<6;i++){ const a=i/6*6.28; g.add(part(new THREE.IcosahedronGeometry(0.12,0), mat('#7d8089',{rough:1}), Math.cos(a)*0.45,0.06,Math.sin(a)*0.45)); }
  const log1=part(new THREE.CylinderGeometry(0.05,0.05,0.7,5), mat('#5a3f28'),0,0.12,0); log1.rotation.z=1.2; g.add(log1);
  const log2=part(new THREE.CylinderGeometry(0.05,0.05,0.7,5), mat('#4a3320'),0,0.12,0); log2.rotation.set(0,1,1.2); g.add(log2);
  const flame=part(new THREE.ConeGeometry(0.22,0.6,6), mat('#ff8a2c',{emis:'#ff7a1c',emisI:1.6}),0,0.4,0);
  g.add(flame); g.userData.flame=flame;
  const light=new THREE.PointLight(col('#ff9a3c'), 2.2, 9, 2); light.position.set(0,0.7,0); light.castShadow=false; g.add(light); g.userData.light=light;
  return g;
}

/* ============================ PLACEMENT =========================== */
function placeY(obj,x,z,off){ obj.position.set(x, groundHeight(x,z)+(off||0), z); return obj; }

const hero=makeAdventurer(); placeY(hero,0,2); hero.rotation.y=Math.PI; scene.add(hero);

const merchant=makeMerchant(); placeY(merchant,3.4,-3.5); merchant.rotation.y=-0.8; scene.add(merchant);
const brute1=makeBrute(); placeY(brute1,-6,-7); brute1.rotation.y=0.6; scene.add(brute1);
const brute2=makeBrute(); placeY(brute2,-9,-3.5); brute2.rotation.y=1.4; brute2.scale.setScalar(0.92); scene.add(brute2);
const chicken=makeChicken(); placeY(chicken,4.5,4); chicken.userData.home={x:4.5,z:4}; scene.add(chicken);

const idlers=[merchant,brute1,brute2];

// house + fence
const house=makeHouse(); placeY(house,7.5,-5.5); house.rotation.y=-0.5; scene.add(house);
// campfire
const fire=makeCampfire(); placeY(fire,2.2,5.5); scene.add(fire);

// trees (avoid pond/path/house)
const trees=[];
const treeSpots=[[-4,3],[-7,5],[-3,8],[6,6],[9,3],[11,-2],[-12,-6],[8,-10],[-2,-11],[13,5],[-13,2],[4,-9]];
treeSpots.forEach((p,i)=>{ const t=makeTree(i+1); placeY(t,p[0],p[1]); t.scale.setScalar(1.0+hash2(i,9)*0.4); scene.add(t); trees.push(t); });

// rocks
for(let i=0;i<16;i++){ const x=(hash2(i,11)-0.5)*40, z=(hash2(i,13)-0.5)*40;
  if(inPond(x,z)||pathDist(x,z)<2) continue; const r=makeRock(i); placeY(r,x,z); scene.add(r); }

// reeds at pond edge
for(let i=0;i<14;i++){ const a=i/14*6.28, x=pond.x+Math.cos(a)*(pond.r-0.2), z=pond.z+Math.sin(a)*(pond.r-0.2);
  const reed=part(new THREE.ConeGeometry(0.04,0.7,4), mat('#6f8a3c'),0,0,0); placeY(reed,x,z,0.35); scene.add(reed); }

/* ---- dust motes ---- */
(function motes(){
  const N=120, pos=new Float32Array(N*3);
  for(let i=0;i<N;i++){ pos[i*3]=(Math.random()-0.5)*44; pos[i*3+1]=Math.random()*8+0.5; pos[i*3+2]=(Math.random()-0.5)*44; }
  const g=new THREE.BufferGeometry(); g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const m=new THREE.PointsMaterial({color:col('#fff2cf'), size:0.06, transparent:true, opacity:0.5, depthWrite:false});
  const p=new THREE.Points(g,m); scene.add(p); window.__motes=p;
})();

/* ---- click marker ---- */
const marker=new THREE.Mesh(new THREE.RingGeometry(0.25,0.4,20).rotateX(-Math.PI/2),
  new THREE.MeshBasicMaterial({color:col('#ffe08a'), transparent:true, opacity:0.0, side:THREE.DoubleSide}));
marker.renderOrder=10; scene.add(marker);

/* ============================ CAMERA ORBIT ======================== */
const sph={ r:14, theta:0.62, phi:0.95 };
const camTarget=new THREE.Vector3();
function clampR(){ sph.r=Math.max(7,Math.min(30,sph.r)); }
function updateCamera(){
  const tx=hero.position.x, ty=hero.position.y+1.1, tz=hero.position.z;
  camTarget.lerp(new THREE.Vector3(tx,ty,tz), 0.12);
  const sp=sph.phi, st=sph.theta;
  camera.position.set(
    camTarget.x + sph.r*Math.sin(sp)*Math.sin(st),
    camTarget.y + sph.r*Math.cos(sp),
    camTarget.z + sph.r*Math.sin(sp)*Math.cos(st)
  );
  camera.lookAt(camTarget);
}

const pointers=new Map(); let downPt=null, dragged=false, lastPinch=null;
function pinchDist(){ const v=[...pointers.values()]; return Math.hypot(v[0].x-v[1].x, v[0].y-v[1].y); }
canvas.addEventListener('pointerdown', e=>{
  canvas.setPointerCapture(e.pointerId);
  pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pointers.size===1){ downPt={x:e.clientX,y:e.clientY}; dragged=false; }
  if(pointers.size===2){ lastPinch=pinchDist(); }
});
canvas.addEventListener('pointermove', e=>{
  if(!pointers.has(e.pointerId)) return;
  const prev=pointers.get(e.pointerId), dx=e.clientX-prev.x, dy=e.clientY-prev.y;
  pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pointers.size===2){ const d=pinchDist(); if(lastPinch){ sph.r*=lastPinch/d; clampR(); } lastPinch=d; return; }
  if(downPt && Math.hypot(e.clientX-downPt.x, e.clientY-downPt.y)>6) dragged=true;
  sph.theta -= dx*0.005; sph.phi -= dy*0.005;
  sph.phi=Math.max(0.35, Math.min(1.4, sph.phi));
});
canvas.addEventListener('pointerup', e=>{
  const two=pointers.size===2; pointers.delete(e.pointerId);
  if(pointers.size<2) lastPinch=null;
  if(!two && !dragged && downPt) handleClick(downPt.x, downPt.y);
  if(pointers.size===0) downPt=null;
});
canvas.addEventListener('wheel', e=>{ sph.r*=1+e.deltaY*0.0012; clampR(); e.preventDefault(); }, {passive:false});

const ray=new THREE.Raycaster();
function handleClick(px,py){
  const ndc=new THREE.Vector2((px/innerWidth)*2-1, -(py/innerHeight)*2+1);
  ray.setFromCamera(ndc, camera);
  const hit=ray.intersectObject(window.__ground);
  if(hit.length){
    const p=hit[0].point; hero.userData.dest=new THREE.Vector2(p.x,p.z);
    marker.position.set(p.x, groundHeight(p.x,p.z)+0.05, p.z);
    marker.material.opacity=0.95; marker.scale.setScalar(1);
  }
}

/* ============================ ANIMATION =========================== */
let walkPhase=0;
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05), t=clock.elapsedTime;

  // hero movement
  const u=hero.userData;
  let moving=false;
  if(u.dest){
    const dx=u.dest.x-hero.position.x, dz=u.dest.y-hero.position.z, dist=Math.hypot(dx,dz);
    if(dist>0.12){
      moving=true; const sp=3.4*dt, k=Math.min(sp/dist,1);
      hero.position.x+=dx*k; hero.position.z+=dz*k;
      hero.position.y=groundHeight(hero.position.x,hero.position.z);
      hero.rotation.y=Math.atan2(dx,dz);
    } else { u.dest=null; }
  }
  // hero limbs
  if(moving){
    walkPhase+=dt*9;
    const s=Math.sin(walkPhase)*0.6;
    u.legL.rotation.x=s; u.legR.rotation.x=-s;
    u.armL.rotation.x=-s*0.7; u.armR.rotation.x=s*0.7;
    u.torso.position.y=0.96+Math.abs(Math.sin(walkPhase))*0.04;
  } else {
    const b=Math.sin(t*1.8)*0.05;
    u.legL.rotation.x*=0.8; u.legR.rotation.x*=0.8;
    u.armL.rotation.x=b; u.armR.rotation.x=-b;
    u.torso.scale.y=1+Math.sin(t*1.8)*0.012;
  }
  if(u.cape) u.cape.rotation.x=0.1+ (moving?Math.sin(walkPhase)*0.12:Math.sin(t*1.5)*0.05);

  // idlers sway
  idlers.forEach((o,i)=>{
    const ph=t*1.3+i*1.7;
    if(o.userData.armL) o.userData.armL.rotation.x=Math.sin(ph)*0.08;
    if(o.userData.armR) o.userData.armR.rotation.x=-Math.sin(ph)*0.08;
    if(o.userData.scaleBob) o.position.y=groundHeight(o.position.x,o.position.z)+Math.abs(Math.sin(ph*0.6))*0.04;
  });

  // chicken wander
  const cu=chicken.userData;
  if(!cu.dest || Math.random()<0.004){
    cu.dest=new THREE.Vector2(cu.home.x+(Math.random()-0.5)*5, cu.home.z+(Math.random()-0.5)*5);
  }
  { const dx=cu.dest.x-chicken.position.x, dz=cu.dest.y-chicken.position.z, d=Math.hypot(dx,dz);
    if(d>0.1){ const k=Math.min(1.0*dt/d,1); chicken.position.x+=dx*k; chicken.position.z+=dz*k;
      chicken.position.y=groundHeight(chicken.position.x,chicken.position.z)+Math.abs(Math.sin(t*12))*0.03;
      chicken.rotation.y=Math.atan2(dx,dz); } }

  // trees sway
  trees.forEach(tr=>{ tr.userData.canopy.rotation.z=Math.sin(t*0.8+tr.userData.sway)*0.03; });

  // campfire flicker
  const fl=fire.userData.flame, fli=fire.userData.light;
  const f=0.85+Math.sin(t*18)*0.1+Math.sin(t*7)*0.06;
  fl.scale.set(f,1.0+Math.sin(t*22)*0.18,f); fli.intensity=2.0+Math.sin(t*20)*0.5;

  // water wobble
  { const arr=water.geometry.attributes.position.array, base=water.userData.base;
    for(let i=0;i<arr.length;i+=3){ arr[i+1]=base[i+1]+Math.sin(t*2+base[i]*1.5+base[i+2])*0.04; }
    water.geometry.attributes.position.needsUpdate=true; }

  // marker fade/expand
  if(marker.material.opacity>0.01){ marker.material.opacity*=0.96; marker.scale.x+=dt*1.2; marker.scale.z+=dt*1.2; }

  // motes drift
  const mp=window.__motes.geometry.attributes.position.array;
  for(let i=1;i<mp.length;i+=3){ mp[i]+=dt*0.25; if(mp[i]>9) mp[i]=0.5; }
  window.__motes.geometry.attributes.position.needsUpdate=true;

  updateCamera();
  renderer.render(scene,camera);
}

addEventListener('resize', ()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });

// kick off
updateCamera();
animate();
setTimeout(()=>{ const l=document.getElementById('loading'); l.style.opacity=0; setTimeout(()=>l.remove(),650); }, 500);
</script>
