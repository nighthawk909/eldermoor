name: ci

# Gate: every push/PR must pass the sim test suite + typecheck, and the legacy
# prototype smoke check, so `main` stays always-playable.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Vitest (sim)
        run: npm test
      - name: Typecheck
        run: npm run typecheck
      - name: Prototype smoke check
        run: npm run smoke
      - name: Parity gate (Definition of Done)
        run: npm run parity
